spring:
  application:
    name: ms-inventario

---
# Perfil local (XAMPP)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/db_ecomarket
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
server:
  port: 8084
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    appname: ms-inventario
    prefer-ip-address: true
    status-page-url-path: /actuator/health
    health-check-url-path: /actuator/health
    home-page-url: http://localhost:8084/api/v1/inventarios

---
# Perfil docker
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/db_ecomarket?allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
server:
  port: ${PORT:8084}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://ms-eureka:8761/eureka}
  instance:
    appname: ms-inventario
    instance-id: ms-inventario:${server.port}
    hostname: ms-inventario
    non-secure-port: 8084
    prefer-ip-address: false
    status-page-url-path: /actuator/health
    health-check-url-path: /actuator/health
    health-check-url: http://ms-inventario:8084/actuator/health
    home-page-url: http://localhost:8084/api/v1/inventarios

logging:
  file:
    name: ../logs/ms-inventario.log

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
