spring:
  application:
    name: ms-descuento
  datasource:
    url: jdbc:mysql://localhost:3307/db_ecomarket
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false

server:
  port: 8089

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    enabled: true
    register-with-eureka: true
    fetch-registry: true
  instance:
    appname: ms-descuento
    instance-id: ms-descuento:127.0.0.1:8089
    hostname: 127.0.0.1
    prefer-ip-address: true
    non-secure-port: 8089
    status-page-url: http://127.0.0.1:8089/actuator/health
    health-check-url: http://127.0.0.1:8089/actuator/health
    home-page-url: http://127.0.0.1:8089/api/v1/descuentos

logging:
  level:
    root: INFO
  file:
    name: logs/ms-descuento.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,actuator
  endpoint:
    health:
      show-details: always