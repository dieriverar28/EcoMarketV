spring:
  application:
    name: ms-producto

---
# Perfil local (XAMPP)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/db_ecomarket
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
server:
  port: 8083
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    appname: ms-producto
    prefer-ip-address: true
    status-page-url-path: /actuator/health
    health-check-url-path: /actuator/health
    home-page-url: http://localhost:8083/api/v1/productos

---
# Perfil docker
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
server:
  port: ${PORT:8083}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://ms-eureka:8761/eureka}
  instance:
    appname: ms-producto
    instance-id: ms-producto:${server.port}
    hostname: ms-producto
    non-secure-port: 8083
    prefer-ip-address: false
    status-page-url-path: /actuator/health
    health-check-url-path: /actuator/health
    health-check-url: http://ms-producto:8083/actuator/health
    home-page-url: http://localhost:8083/api/v1/productos

logging:
  file:
    name: ../logs/ms-producto.log

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
